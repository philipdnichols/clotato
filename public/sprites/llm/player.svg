<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Golden-brown potato body -->
  <ellipse cx="32" cy="34" rx="20" ry="23" fill="#c8860a" stroke="#7a4f00" stroke-width="2.5"/>
  <!-- Skin texture / bump on top-left -->
  <ellipse cx="22" cy="24" rx="5" ry="4" fill="#d99a22" stroke="#7a4f00" stroke-width="1.5"/>
  <!-- Body highlight -->
  <ellipse cx="26" cy="26" rx="9" ry="7" fill="#f0c040" fill-opacity="0.55"/>
  <!-- Shadow at bottom -->
  <ellipse cx="34" cy="50" rx="13" ry="5" fill="#7a4f00" fill-opacity="0.35"/>
  <!-- Left eye -->
  <circle cx="25" cy="32" r="4" fill="#2a1200"/>
  <circle cx="26" cy="31" r="1.5" fill="white"/>
  <!-- Right eye -->
  <circle cx="38" cy="32" r="4" fill="#2a1200"/>
  <circle cx="39" cy="31" r="1.5" fill="white"/>
  <!-- Blush left -->
  <ellipse cx="18" cy="37" rx="5" ry="3" fill="#e86030" fill-opacity="0.45"/>
  <!-- Blush right -->
  <ellipse cx="46" cy="37" rx="5" ry="3" fill="#e86030" fill-opacity="0.45"/>
  <!-- Smile -->
  <path d="M 26 42 Q 32 47 38 42" stroke="#7a4f00" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Small sprout on top -->
  <path d="M 32 11 Q 28 5 24 8" stroke="#55aa22" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 32 11 Q 36 3 40 7" stroke="#55aa22" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="32" cy="11" r="2" fill="#44aa11"/>
</svg>
