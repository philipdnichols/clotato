  <path d="M 24 8 C 34 8 42 14 43 24 C 44 32 38 42 24 43 C 10 42 5 32 6 24 C 7 14 14 8 24 8 Z"
        fill="#22cc33" stroke="#118822" stroke-width="2.5"/>
  <!-- Highlight blob -->
