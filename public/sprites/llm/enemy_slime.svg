  <!-- Drip at bottom -->
  <path d="M 22 43 Q 20 50 22 52" stroke="#118822" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 28 43 Q 30 49 28 51" stroke="#118822" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Eyes — simple and slightly dumb-looking -->
  <circle cx="19" cy="26" r="5" fill="#003300"/>
  <circle cx="20" cy="25" r="2" fill="white"/>
  <circle cx="29" cy="26" r="5" fill="#003300"/>
  <circle cx="30" cy="25" r="2" fill="white"/>
  <!-- Mouth — goofy open grin -->
  <path d="M 17 34 Q 24 40 31 34" stroke="#004400" stroke-width="2" fill="#00aa22" stroke-linecap="round"/>
</svg>
