<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- Swarm unit — tiny angry fry / pellet -->
  <!-- Body -->
  <ellipse cx="12" cy="13" rx="8" ry="9" fill="#ee2222" stroke="#990000" stroke-width="2"/>
  <!-- Highlight -->
  <ellipse cx="10" cy="9" rx="4" ry="3" fill="#ff8888" fill-opacity="0.6"/>
  <!-- Tiny dot eyes, angry -->
  <circle cx="9"  cy="12" r="2" fill="#110000"/>
  <circle cx="15" cy="12" r="2" fill="#110000"/>
  <circle cx="9"  cy="12" r="0.8" fill="white"/>
  <circle cx="15" cy="12" r="0.8" fill="white"/>
  <!-- Tiny angry brow -->
  <line x1="7"  y1="9" x2="11" y2="11" stroke="#880000" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="13" y1="11" x2="17" y2="9" stroke="#880000" stroke-width="1.5" stroke-linecap="round"/>
</svg>
